name = "irma-client"
account_id = "a40160575af8ebbeff7d70fd666a5a64"
main = "src/worker.js"
workers_dev = true
preview_urls = false
compatibility_flags = ["nodejs_compat_v2"]
compatibility_date = "2025-11-21"

# Secrets (set per environment via `npx wrangler secret put <NAME> --env <env>`):
#   ADMIN_PRIVATE_KEY — JSON byte array of the admin keypair (phantom1.json)
#   HELIUS_API_KEY    — Helius RPC API key

[triggers]
crons = ["0 6 * * *"]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

# Default vars (used for local `wrangler dev` — not deployed directly)
[vars]
TRUFLATION_PROXY_URL = "https://truflation-proxy-one.vercel.app"
POOL_ADDRESS = "BCvW192j75p5ocrEddvDXPJBtt19xVaedzUR3tXHUBK1"
RESERVE_SYMBOL = "devUSDT"
RESERVE_MINT_STR = "4YKp5kpZCL7NLsrwu5vieTg2zhwdP5WZr8aLPdFTgawW"
IRMA_MINT_STR = "EwotD7KQ8TgdvrKWaFVLPRgQnt98Ltjq98UggzFcKbDY"
TARGET_INFLATION_RATE = "2.0"
ENABLE_TEST_SCAFFOLDING = "true"

# =============================================================================
# Per-pool environments — deploy with: npx wrangler deploy --env <env>
# Secrets must be set separately: npx wrangler secret put ADMIN_PRIVATE_KEY --env <env>
