[toolchain]
anchor_version = "0.32.1"
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

# Build configuration for Solana BPF target
[build]
rustflags = ["--cfg", "getrandom_custom"]

[programs.devnet]
# irma = "E15v5VirGqdbH4fYhxxxZHNiLAP3t3y1SPonhrQxoTcs"
irma = "A7K5E3qPN1GUSQXUtvbruMwmBsGgcXuH7Gvn1ZUQsqf1"

[programs.localnet]
irma = "E15v5VirGqdbH4fYhxxxZHNiLAP3t3y1SPonhrQxoTcs"

[programs.mainnet]
irma = "E15v5VirGqdbH4fYhxxxZHNiLAP3t3y1SPonhrQxoTcs"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Devnet"
# wallet = "~/.config/solana/phantom1.json"
wallet = "~/.config/solana/id.json"

[scripts]
test = "TS_NODE_PROJECT=./tsconfig.test.json NODE_OPTIONS=\"--experimental-specifier-resolution=node --loader ts-node/esm\" yarn mocha tests/read_protocol_state.ts --timeout 1000000"

[test]
startup_wait = 10000
shutdown_wait = 2000
upgradeable = false
