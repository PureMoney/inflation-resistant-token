[toolchain]
anchor_version = "0.30.1"
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.devnet]
irma = "9akX8KP7Jvn7EzESjA88CKBAySQzB1CJvqLWGaDkGQMD"

[programs.localnet]
irma = "9akX8KP7Jvn7EzESjA88CKBAySQzB1CJvqLWGaDkGQMD"

[programs.mainnet]
irma = "9akX8KP7Jvn7EzESjA88CKBAySQzB1CJvqLWGaDkGQMD"

[registry]
